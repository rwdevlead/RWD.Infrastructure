---
- name: Create Pi-hole directories
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ pihole_base_dir }}"
    - "{{ pihole_base_dir }}/etc-pihole"
    - "{{ pihole_base_dir }}/etc-dnsmasq.d"

- name: Deploy Pi-hole docker-compose file
  template:
    src: docker-compose.yml.j2
    dest: "{{ pihole_base_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"

# -----------------------
# Start container only if not in check mode
# -----------------------
- name: Start Pi-hole container
  community.docker.docker_compose_v2:
    project_src: "{{ pihole_base_dir }}"
    state: present
  when: not ansible_check_mode

# -------------------------------
# Post-deploy health assertion
# -------------------------------
- name: Wait for Pi-hole container to become healthy
  community.docker.docker_container_info:
    name: "{{ pihole_container_name }}"
  register: pihole_container_info
  until:
    - pihole_container_info.container is not none
    - pihole_container_info.container.State is defined
    - pihole_container_info.container.State.Health.Status | default('') == "healthy"
  retries: 15
  delay: 10
  when: not ansible_check_mode

- name: Final health assertion
  ansible.builtin.assert:
    # Use the same variable here to keep the error message accurate
    that:
      - pihole_container_info.container.State.Health.Status == "healthy"
    fail_msg: "Container {{ pihole_container_name }} failed to reach healthy state."
  when: not ansible_check_mode
