---
- name: Create Homepage directories
  ansible.builtin.file:
    path: "{{ homepage_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ homepage_base_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"

- name: Deploy Homepage
  community.docker.docker_compose_v2:
    project_src: "{{ homepage_base_dir }}"
    pull: "{{ homepage_update }}"
    recreate: smart
