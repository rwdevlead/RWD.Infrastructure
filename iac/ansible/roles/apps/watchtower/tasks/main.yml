- name: Deploy Watchtower (notify-only, self-monitoring)
  community.docker.docker_container:
    name: "{{ watchtower_instances[inventory_hostname].name }}"
    image: "{{ watchtower_image }}"
    recreate: true
    restart_policy: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - "{{ watchtower_cleanup | ternary('--cleanup', '') }}"
      - "--label-enable"
      - "{{ watchtower_monitor_only | ternary('--monitor-only', '') }}"
      - "--schedule"
      - "{{ watchtower_schedule }}"
    env:
      TZ: "{{ shared_timezone }}"
      DOCKER_API_VERSION: "{{ shared_docker_api_version }}"
      WATCHTOWER_NOTIFICATIONS: email
      WATCHTOWER_NOTIFICATION_EMAIL_FROM: "{{ watchtower_instances[inventory_hostname].email }}"
      WATCHTOWER_NOTIFICATION_EMAIL_TO: "{{ mailrise.email }}"
      WATCHTOWER_NOTIFICATION_EMAIL_SERVER: "{{ mailrise.domain }}"
      WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PORT: "{{ 'mailrise.port' }}"
      WATCHTOWER_HTTP_API_METRICS: "true"
      WATCHTOWER_HTTP_API_TOKEN: "{{ lookup('ansible.builtin.env', 'WATCHTOWER_TOKEN') }}"
    ports:
      - "8082:8080"
    labels:
      com.centurylinklabs.watchtower.enable: "false"
    networks:
      - name: "{{ shared_docker_network }}"
    state: started
