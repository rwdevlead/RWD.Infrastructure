---
- name: Ensure Traefik directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ traefik_base_dir }}"
    - "{{ traefik_data_dir }}/config"
    - "{{ traefik_data_dir }}/acme"
    - "{{ traefik_data_dir }}/volumes"
    - "{{ traefik_data_dir }}/logs"

- name: Ensure acme.json exists
  ansible.builtin.file:
    path: "{{ traefik_data_dir }}/acme/acme.json"
    state: touch
    owner: root
    group: root
    mode: "0600"

- name: Ensure Traefik docker network exists
  community.docker.docker_network:
    name: "{{ traefik_network }}"
    state: present

- name: Render Traefik dynamic config
  ansible.builtin.template:
    src: dynamic.yml.j2
    dest: "{{ traefik_data_dir }}/config/dynamic.yml"
    mode: "0644"

- name: Render Traefik docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ traefik_base_dir }}/docker-compose.yml"
    mode: "0644"

- name: Deploy Traefik via Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ traefik_base_dir }}"
    state: present
  when: not ansible_check_mode

# ========================
# Health Checks & Assertions
# ========================

- name: Wait for Traefik container to be healthy
  community.docker.docker_container_info:
    name: "{{ traefik_container_name }}"
  register: traefik_container
  until:
    - traefik_container.container is defined
    - traefik_container.container.State.Health.Status == "healthy"
  retries: 30
  delay: 2
  when: not ansible_check_mode

- name: Verify Traefik API ping endpoint is responsive
  ansible.builtin.uri:
    url: "http://localhost:{{ traefik_port_api }}/ping"
    method: GET
  register: ping_result
  until: ping_result.status == 200
  retries: 10
  delay: 1
  when: not ansible_check_mode

- name: Final health assertion for Traefik
  ansible.builtin.assert:
    that:
      - traefik_container.container.State.Health.Status == "healthy"
      - ping_result.status == 200
    fail_msg: "Traefik failed to reach healthy state. Container status: {{ traefik_container.container.State.Health.Status | default('Unknown') }}"
  when: not ansible_check_mode
