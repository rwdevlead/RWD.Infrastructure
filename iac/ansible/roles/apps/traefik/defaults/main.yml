---
traefik_image: "traefik"
traefik_tag: "v3.6.1"

traefik_base_dir: "{{ docker_base_dir }}/traefik"
traefik_data_dir: "{{ docker_base_mnt }}/traefik"
traefik_volumes_dir: "{{ traefik_data_dir }}/volumes"
traefik_logs_dir: "{{ traefik_data_dir }}/logs"

traefik_acme_email: "srdevlead@outlook.com"
traefik_acme_resolver: "cloudflare"
traefik_acme_domain_main: "rwdevs.com"
traefik_acme_domain_sans: "*.rwdevs.com,*.local.rwdevs.com"
traefik_acme_server: "https://acme-v02.api.letsencrypt.org/directory"

traefik_port_http: 80
traefik_port_https: 443
traefik_port_api: 8080

traefik_dns_resolvers:
  - "1.1.1.1:53"
  - "1.0.0.1:53"

traefik_insecure_skip_verify: true
traefik_hsts_max_age: 15552000

traefik_ip_whitelist:
  - "10.0.0.0/8"
  - "192.168.50.0/24"
  - "172.18.0.0/16"

cloudflare_dns_api_token: "{{ lookup('env', 'CF_DNS_API_TOKEN') }}"
