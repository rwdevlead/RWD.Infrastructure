---
- name: Create Semaphore directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ semaphore_base_dir }}"
    - "{{ semaphore_data_dir }}"
    - "{{ semaphore_db_dir }}"

- name: Render environment file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ semaphore_base_dir }}/.env"
    owner: root
    group: root
    mode: "0600"

- name: Render docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ semaphore_base_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"

- name: Deploy Semaphore
  community.docker.docker_compose_v2:
    project_src: "{{ semaphore_base_dir }}"
    pull: "{{ semaphore_update }}"
    recreate: smart
