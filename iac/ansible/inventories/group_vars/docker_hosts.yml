# Global Settings
shared_timezone: "America/New_York"

# Security Defaults
security_fail2ban_enabled: true
security_sysctl_enabled: true
security_firewall_enabled: true
ssh_port: 22

# Global Docker Info
shared_docker_api_version: "1.52"
shared_docker_network: "traefik"
docker_base_dir: /opt/docker
docker_base_mnt: /mnt/docker
docker_users:
  - ka8kgj
nfs_mounts:
  - path: "/mnt/docker"
    src: "192.168.50.13:/mnt/tank/docker/{{ inventory_hostname }}"
    opts: "rw,soft,intr"

# --- PiHole and Nebula Sync Configuration Variables ---
pihole_instances:
  prod-docker-01:
    name: "pihole-p01"
    domain: pihole-p01.local.rwdevs.com
    url: "https://pihole-p01.local.rwdevs.com"
    server: "prod-docker-01"
    container: "pihole-p01"
    env_user_pwd: "PIHOLE_P01_PASSWORD"
  dev-docker-01:
    name: "pihole-d01"
    domain: pihole-d01.local.rwdevs.com
    url: "https://pihole-d01.local.rwdevs.com"
    server: "dev-docker-01"
    container: "pihole-d01"
    env_user_pwd: "PIHOLE_D01_PASSWORD"

nebula_sync_url: "http://192.168.50.14:8888/api/auth"
# Core API Endpoint Configuration (Pi-hole v6 App Endpoints)
nebula_sync_primary_node: "http://192.168.50.14:8888" # Replace with your primary Pi-hole IP/DNS
nebula_sync_replica_node: "http://192.168.50.12:8888" # Replace with your replica Pi-hole IP/DNS

# Pi-hole API App Passwords
# Note: Ensure 'webserver.api.app_sudo: true' is set on the replica instance
nebula_sync_primary_token: "{{ lookup('ansible.builtin.env', 'PIHOLE_P01_PASSWORD') }}"
nebula_sync_replica_token: "{{ lookup('ansible.builtin.env', 'PIHOLE__D01_PASSWORD') }}"

# traefik
traefik_instance:
  name: "traefik-d01"
  domain: "traefik-d01.local.rwdevs.com"
  server: dev-docker-01
  container: traefik-d01
  url: "https://traefik-d01.local.rwdevs.com"
  env_token_key: "CF_DNS_API_TOKEN"

# --- Proxmox Instances ---
proxmox_instances:
  - name: "proxmox"
    domain: "proxmox.local.rwdevs.com"
    url: "https://192.168.50.11:8006"
    env_user_key: "PROXMOX_API_USER"
    env_token_key: "PROXMOX_API_TOKEN"
  - name: "pve-p01"
    domain: "pve-p01.local.rwdevs.com"
    url: "https://192.168.50.10:8006"
    env_user_key: "PVE_P01_API_USER"
    env_token_key: "PVE_P01_API_TOKEN"

watchtower_instances:
  dev-docker-01:
    name: watchtower-d01
    email: watchtower-d01@rwdevs.com
    server: dev-docker-01
    container: watchtower-d01
    widget:
      url: http://192.168.50.12:8082
      key_env: WATCHTOWER_TOKEN
  prod-docker-01:
    name: watchtower-p01
    email: watchtower-p01@rwdevs.com
    ping: 192.168.50.14
    widget:
      url: http://192.168.50.14:8082
      key_env: WATCHTOWER_TOKEN

portainer_instance:
  url: "https://portainer-d01.local.rwdevs.com"
  container: portainer-d01
  domain: portainer-d01.local.rwdevs.com

portainer_agents:
  dev-docker-01:
    name: portainer-d01
    description: Development Docker Environment
    server: dev-docker-01
    container: portainer-d01
    widget:
      url: "{{ portainer_instance.url }}"
      env: 3
      key_env: HOMEPAGE_PORTAINER_D01_KEY
  prod-docker-01:
    name: portainer-agent-p01
    description: Production Docker Environment
    ping: 192.168.50.14
    widget:
      url: "{{ portainer_instance.url }}"
      env: 5
      key_env: HOMEPAGE_PORTAINER_D01_KEY

mailrise:
  name: mailrise-p01
  domain: "mailrise.local.rwdevs.com"
  email: "email@mailrise.xyz"
  port: 8025

truenas:
  url: "https://truenas-d01.local.rwdevs.com"

homepage:
  domain: "homepage-d01.local.rwdevs.com"
  port: 3000

homeassistant:
  url: "http://192.168.50.15:8123"
  href: "http://ha.local.rwdevs.com"
  domain: "ha.local.rwdevs.com"
