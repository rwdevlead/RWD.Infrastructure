---
new_hostname: dev-docker-01

# Traefik configuration
traefik_container_name: "traefik-d01"
traefik_dashboard_domain: "traefik-d01.local.rwdevs.com"
traefik_dashboard_url: "https://traefik-d01.local.rwdevs.com"
traefik_acme_domain_main: "rwdevs.com"
traefik_acme_domain_sans: "*.rwdevs.com,*.local.rwdevs.com"
traefik_acme_server: "https://acme-v02.api.letsencrypt.org/directory"
traefik_port_http: 80
traefik_port_https: 443
traefik_port_api: 8080
traefik_dns_resolvers:
  - "1.1.1.1:53"
  - "1.0.0.1:53"
traefik_docker_api_version: "{{ shared_docker_api_version }}"
traefik_insecure_skip_verify: true
traefik_hsts_max_age: 15552000
traefik_ip_whitelist:
  - "10.0.0.0/8"
  - "192.168.50.0/24"
  - "172.18.0.0/16"

# Portainer configuration
portainer_container_name: "portainer-d01"
portainer_domain: "portainer-d01.local.rwdevs.com"
portainer_docker_network: "{{ shared_docker_network }}"
portainer_watchtower_enable: "true"

# Watchtower
watchtower_name: watchtower-d01
watchtower_network: "{{ shared_docker_network }}"
watchtower_email_from: watchtower-d01@rwdevs.com

# Homepage service variables
homepage_container_name: "homepage-d01"
